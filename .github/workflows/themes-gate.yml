# G1-B: light CI gate — npm test = themes + deps + freshness (no Codex/CDP/Windows install state).
# Full doctor/smoke/probe remain local. See docs/plans/residual-g1-g3-g4-g5-2026-07-20.md
name: themes-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  themes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Unit gates (themes + deps + freshness)
        run: npm test
